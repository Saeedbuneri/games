<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏸 Game Host - Badminton</title>
  <script src="env.js"></script>
  <script src="config.js"></script>
  <script src="room-manager.js"></script>
  <script src="ably-client.js"></script>
  <script src="physics.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      overflow: hidden;
      color: white;
    }
    
    .setup-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
    }
    
    .setup-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 60px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .room-code-display {
      background: white;
      color: #0f172a;
      padding: 30px;
      border-radius: 20px;
      margin: 30px 0;
    }
    
    .room-code {
      font-size: 4em;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: #667eea;
      text-shadow: 0 2px 10px rgba(102,126,234,0.3);
    }
    
    .qr-container {
      background: white;
      padding: 20px;
      border-radius: 20px;
      display: inline-block;
      margin: 20px 0;
    }
    
    #qrCode img {
      display: block;
    }
    
    .player-list {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      min-height: 100px;
    }
    
    .player-item {
      background: rgba(102,126,234,0.3);
      padding: 15px 20px;
      border-radius: 10px;
      margin: 10px 0;
      display: flex;
      align-items: center;
      gap: 15px;
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
    }
    
    .start-button {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none;
      padding: 20px 60px;
      border-radius: 50px;
      font-size: 1.5em;
      font-weight: 700;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(74,222,128,0.4);
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    
    .start-button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(74,222,128,0.5);
    }
    
    .start-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .game-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    .game-screen.active {
      display: block;
    }
    
    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .hud {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      z-index: 10;
    }
    
    .score-panel {
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(10px);
      padding: 25px 50px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 2px solid rgba(102,126,234,0.5);
      text-align: center;
      min-width: 180px;
    }
    
    .player-name {
      font-size: 1.2em;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .score {
      font-size: 4em;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .game-event {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5em;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 30px rgba(102,126,234,0.8);
      z-index: 50;
      animation: eventPop 1s ease-out;
      pointer-events: none;
    }
    
    @keyframes eventPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
    
    .connection-status {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(15,23,42,0.9);
      padding: 12px 25px;
      border-radius: 15px;
      font-size: 0.9em;
      border: 2px solid rgba(248, 113, 113, 0.5);
      z-index: 10;
    }
    
    .connection-status.connected {
      border-color: rgba(74, 222, 128, 0.5);
      color: #4ade80;
    }
    
    .room-code-corner {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(15,23,42,0.95);
      padding: 15px 30px;
      border-radius: 15px;
      border: 2px solid rgba(102,126,234,0.5);
      z-index: 10;
    }
    
    .room-code-corner .label {
      font-size: 0.8em;
      color: #94a3b8;
      margin-bottom: 5px;
    }
    
    .room-code-corner .code {
      font-size: 1.8em;
      font-weight: 800;
      color: #667eea;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <!-- Setup Screen -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-card">
      <h1 style="font-size: 2.5em; margin-bottom: 20px;">🏸 Create Game Room</h1>
      
      <div class="room-code-display">
        <div style="font-size: 1.2em; color: #64748b; margin-bottom: 10px; font-weight: 600;">ROOM CODE</div>
        <div class="room-code" id="roomCode">------</div>
      </div>
      
      <div class="qr-container">
        <div id="qrCode"></div>
        <div style="margin-top: 10px; color: #64748b;">Scan to join</div>
      </div>
      
      <h3 style="margin: 30px 0 15px; color: #94a3b8;">Waiting for Players...</h3>
      <div class="player-list" id="playerList">
        <div style="color: #64748b; font-size: 0.95em;">No players yet. Share the room code!</div>
      </div>
      
      <button class="start-button" id="startButton" disabled onclick="startGame()">
        🚀 START GAME
      </button>
      
      <div style="margin-top: 20px; color: #94a3b8; font-size: 0.9em;">
        Need at least 2 players to start
      </div>
    </div>
  </div>

  <!-- Game Screen -->
  <div class="game-screen" id="gameScreen">
    <canvas id="gameCanvas" width="1920" height="1080"></canvas>
    
    <div class="room-code-corner">
      <div class="label">ROOM</div>
      <div class="code" id="gameRoomCode">------</div>
    </div>
    
    <div class="hud">
      <div class="score-panel">
        <div class="player-name" id="player1Name">Player 1</div>
        <div class="score" id="score1">0</div>
      </div>
      <div class="score-panel">
        <div class="player-name" id="player2Name">Player 2</div>
        <div class="score" id="score2">0</div>
      </div>
    </div>
    
    <div class="connection-status" id="connectionStatus">
      Connecting...
    </div>
  </div>

  <script src="host-screen.js"></script>
</body>
</html>
