<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏸 Badminton Racket</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 500px;
      width: 100%;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease-out;
    }
    
    .logo-icon {
      font-size: 5em;
      margin-bottom: 10px;
      animation: bounce 2s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    
    .logo h1 {
      color: white;
      font-size: 2.5em;
      font-weight: 800;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-bottom: 5px;
    }
    
    .logo p {
      color: rgba(255,255,255,0.9);
      font-size: 1.1em;
      font-weight: 500;
    }
    
    .card {
      background: white;
      border-radius: 25px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .role-selector {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .role-button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 15px;
      padding: 30px 25px;
      color: white;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .role-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }
    
    .role-button:active {
      transform: translateY(-1px);
    }
    
    .role-icon {
      font-size: 3em;
      flex-shrink: 0;
    }
    
    .role-content {
      text-align: left;
      flex: 1;
    }
    
    .role-title {
      font-size: 1.4em;
      margin-bottom: 5px;
    }
    
    .role-desc {
      font-size: 0.9em;
      opacity: 0.9;
      font-weight: 400;
    }
    
    .screen-select {
      display: none;
    }
    
    .screen-select.active {
      display: block;
    }
    
    .back-button {
      background: transparent;
      border: 2px solid #667eea;
      color: #667eea;
      border-radius: 10px;
      padding: 12px 25px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
      width: 100%;
    }
    
    .back-button:hover {
      background: #667eea;
      color: white;
    }
    
    .device-info {
      text-align: center;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 15px;
      margin-top: 20px;
    }
    
    .device-info p {
      color: #64748b;
      font-size: 0.95em;
      line-height: 1.6;
    }
    
    .screen-type {
      display: none;
    }
    
    .screen-type.active {
      display: block;
    }
    
    @media (max-width: 480px) {
      .logo h1 {
        font-size: 2em;
      }
      
      .card {
        padding: 30px 20px;
      }
      
      .role-button {
        padding: 25px 20px;
      }
      
      .role-icon {
        font-size: 2.5em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🏸</div>
      <h1>Badminton</h1>
      <p>Racket Game</p>
    </div>
    
    <div class="card">
      <!-- Role Selection -->
      <div class="role-selector" id="roleSelector">
        <button class="role-button" onclick="selectRole('screen')">
          <div class="role-icon">🖥️</div>
          <div class="role-content">
            <div class="role-title">Main Screen</div>
            <div class="role-desc">Create game room on TV/Computer</div>
          </div>
        </button>
        
        <button class="role-button" onclick="selectRole('controller')">
          <div class="role-icon">🎮</div>
          <div class="role-content">
            <div class="role-title">Controller</div>
            <div class="role-desc">Use phone as badminton racket</div>
          </div>
        </button>
      </div>
      
      <!-- Screen Type Selection -->
      <div class="screen-select screen-type" id="screenSelect">
        <h2 style="color: #1e293b; margin-bottom: 20px; text-align: center;">Choose Display Type</h2>
        
        <button class="role-button" onclick="openMainScreen()">
          <div class="role-icon">📺</div>
          <div class="role-content">
            <div class="role-title">Big Screen (TV)</div>
            <div class="role-desc">For large displays - Create & host game</div>
          </div>
        </button>
        
        <button class="role-button" onclick="openPhoneScreen()">
          <div class="role-icon">📱</div>
          <div class="role-content">
            <div class="role-title">Phone Screen</div>
            <div class="role-desc">Use phone as display (portable mode)</div>
          </div>
        </button>
        
        <button class="back-button" onclick="goBack()">← Back</button>
      </div>
      
      <div class="device-info">
        <p><strong>💡 Quick Guide</strong></p>
        <p>Main Screen creates room → Controllers scan code → Play!</p>
      </div>
    </div>
  </div>

  <script>
    let selectedRole = null;

    function selectRole(role) {
      selectedRole = role;
      
      if (role === 'screen') {
        document.getElementById('roleSelector').style.display = 'none';
        document.getElementById('screenSelect').classList.add('active');
      } else if (role === 'controller') {
        // Check if mobile
        if (isMobile()) {
          window.location.href = 'controller.html';
        } else {
          alert('⚠️ Controllers work best on mobile devices with motion sensors!\n\nPlease open this page on your smartphone to use it as a controller.');
        }
      }
    }

    function openMainScreen() {
      window.location.href = 'host-screen.html';
    }

    function openPhoneScreen() {
      window.location.href = 'phone-screen.html';
    }

    function goBack() {
      document.getElementById('screenSelect').classList.remove('active');
      document.getElementById('roleSelector').style.display = 'flex';
      selectedRole = null;
    }

    function isMobile() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    // Auto-detect and suggest
    window.addEventListener('load', () => {
      const isMobileDevice = isMobile();
      const info = document.querySelector('.device-info p:last-child');
      
      if (isMobileDevice) {
        info.innerHTML = '📱 Mobile detected! Use as <strong>Controller</strong> recommended.';
      } else {
        info.innerHTML = '🖥️ Desktop detected! Use as <strong>Main Screen</strong> recommended.';
      }
    });
  </script>
</body>
</html>
